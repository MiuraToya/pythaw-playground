name: pythaw check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      # github format — shows annotations in Actions log
      - name: Run pythaw (github format)
        run: uvx pythaw check --format github --exit-zero .

      # sarif format — uploads to Code Scanning
      - name: Run pythaw (sarif format)
        run: uvx pythaw check --format sarif --exit-zero . > results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
        if: always()
